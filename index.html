<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maaru Shop</title>

    <!-- Tailwind CSS (CDN)；正式上線可改為 PostCSS/CLI 以消除主控台警告：https://tailwindcss.com/docs/installation -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Site CSS (keep custom CSS separate) -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="min-h-screen text-slate-900">
    <div id="root"></div>

    <!-- React / ReactDOM (CDN, pin versions for stability) -->
    <!-- NOTE: Do NOT set crossorigin here; it can trigger CORS mode and break some CDNs/redirects. -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

    <!-- Babel 瀏覽器編譯 JSX（開發用）；正式上線建議改為建置時預編譯以消除主控台警告 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App JS (kept separate from HTML) -->
    <script type="text/babel" data-presets="env,react" src="./js/app.jsx"></script>
  </body>
</html>
